name: Update Artemis II Telemetry

on:
  schedule:
    - cron: '*/30 * * * *'   # Cada 30 minutos
  workflow_dispatch:          # Permitir ejecución manual

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch telemetry from JPL Horizons
        run: |
          # Obtener fecha actual
          TODAY=$(date -u +"%Y-%m-%d")
          TOMORROW=$(date -u -d "+1 day" +"%Y-%m-%d")
          
          # Llamar a la API de JPL Horizons
          curl -s "https://ssd.jpl.nasa.gov/api/horizons.api?format=json&COMMAND='-1024'&EPHEM_TYPE='VECTORS'&CENTER='500@399'&START_TIME='${TODAY}'&STOP_TIME='${TOMORROW}'&STEP_SIZE='1d'&OUT_UNITS='KM-S'" > api/raw_response.json
          
          # Extraer RG y RR usando Python
          python3 -c "
import json, re
with open('api/raw_response.json') as f:
    data = json.load(f)
result = data.get('result', '')
rg_match = re.search(r'RG=\s*([\d.E+-]+)', result)
rr_match = re.search(r'RR=\s*([\d.E+-]+)', result)
lt_match = re.search(r'LT=\s*([\d.E+-]+)', result)
output = {
    'timestamp': '${TODAY}T00:00:00Z',
    'distance_km': float(rg_match[1]) if rg_match else 0,
    'velocity_kms': float(rr_match[1]) if rr_match else 0,
    'velocity_kmh': float(rr_match[1]) * 3600 if rr_match else 0,
    'light_time_sec': float(lt_match[1]) if lt_match else 0,
    'source': 'NASA JPL Horizons',
    'status': 'live'
}
with open('api/data.json', 'w') as out:
    json.dump(output, out, indent=2)
print(f'Data saved: {output[\"distance_km\"]} km, {output[\"velocity_kmh\"]} km/h')
"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Artemis II telemetry [skip ci]"
          git push