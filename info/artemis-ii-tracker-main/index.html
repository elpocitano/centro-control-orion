<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Artemis II — Live Mission Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            cursor: grab;
        }
        body:active { cursor: grabbing; }
        #canvas-container { width: 100vw; height: 100vh; }

        #hud {
            position: fixed; top: 0; left: 0; width: 100%;
            pointer-events: none; z-index: 10;
            padding: 24px 32px;
        }
        #hud-left { display: flex; flex-direction: column; gap: 4px; }
        .mission-title {
            font-size: 11px; font-weight: 600; letter-spacing: 5px;
            text-transform: uppercase; color: rgba(255,255,255,0.4);
        }
        .mission-name {
            font-size: 38px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #6ec6ff 60%, #ff6b35 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .mission-status {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
            text-transform: uppercase; color: #4cff91; margin-top: 2px;
        }
        .status-dot {
            width: 7px; height: 7px; background: #4cff91; border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px #4cff91; }
            50% { opacity: 0.3; box-shadow: 0 0 14px #4cff91; }
        }

        #telemetry {
            position: fixed; bottom: 28px; left: 32px; z-index: 10; pointer-events: none;
        }
        .telem-grid { display: grid; grid-template-columns: repeat(2, auto); gap: 10px; }
        .telem-card {
            background: rgba(10,12,20,0.7); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 14px 18px; min-width: 145px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .telem-label {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 6px;
        }
        .telem-value {
            font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; color: #fff;
        }
        .telem-unit {
            font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.35); margin-left: 3px;
        }


        #timeline {
            position: fixed; bottom: 28px; right: 32px; z-index: 10;
            pointer-events: auto; width: 340px;
        }
        .timeline-bar {
            background: rgba(10,12,20,0.7); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 16px 20px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .timeline-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .timeline-title {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.3);
        }
        .timeline-met {
            font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: #6ec6ff;
        }
        .progress-track {
            width: 100%; position: relative; margin-bottom: 12px;
            height: 16px; display: flex; align-items: center;
        }
        .timeline-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 3px; border-radius: 2px; outline: none;
            cursor: pointer; pointer-events: auto;
            background: rgba(255,255,255,0.08);
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 13px; height: 13px; border-radius: 50%;
            background: #fff; cursor: pointer; border: none;
            box-shadow: 0 0 12px rgba(255,255,255,0.7);
            margin-top: -5px;
        }
        .timeline-slider::-moz-range-thumb {
            width: 13px; height: 13px; border-radius: 50%;
            background: #fff; cursor: pointer; border: none;
            box-shadow: 0 0 12px rgba(255,255,255,0.7);
        }
        .timeline-slider::-webkit-slider-runnable-track {
            height: 3px; border-radius: 2px;
        }
        .timeline-slider::-moz-range-track {
            height: 3px; border-radius: 2px;
            background: rgba(255,255,255,0.08);
        }
        .phase-labels { display: flex; justify-content: space-between; }
        .phase-label {
            font-size: 8px; font-weight: 600; color: rgba(255,255,255,0.2); letter-spacing: 0.5px;
        }
        .phase-label.active { color: #6ec6ff; }

        #controls-hint {
            position: fixed; top: 28px; right: 32px; z-index: 10;
            pointer-events: auto; display: flex; flex-direction: column;
            gap: 5px; align-items: flex-end;
        }
        .hint-btn {
            background: rgba(10,12,20,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 7px 14px; min-width: 135px; text-align: center;
            color: rgba(255,255,255,0.45); font-size: 11px; font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer; backdrop-filter: blur(24px); transition: all 0.3s;
        }
        .hint-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .hint-btn.active {
            background: rgba(110,198,255,0.12); border-color: rgba(110,198,255,0.25); color: #6ec6ff;
        }
        .hint-btn.sim-active {
            background: rgba(255,107,53,0.15); border-color: rgba(255,107,53,0.3); color: #ff8855;
        }
        .sim-group { position: relative; }
        .sim-dropdown {
            display: none; position: absolute; right: 0; top: 100%; margin-top: 4px;
            background: rgba(10,12,20,0.85); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; overflow: hidden; min-width: 80px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .sim-dropdown.open { display: block; }
        .sim-opt {
            display: block; width: 100%; padding: 8px 14px; border: none;
            background: transparent; color: rgba(255,255,255,0.6); font-size: 11px;
            font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer;
            text-align: right; transition: all 0.2s;
        }
        .sim-opt:hover { background: rgba(255,107,53,0.15); color: #ff8855; }
        .sim-slider-wrap {
            display: none; align-items: center; gap: 8px; margin-top: 4px;
            pointer-events: auto;
        }
        .sim-slider-wrap.visible { display: flex; }
        .sim-slider-wrap input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 120px; height: 3px; background: rgba(255,255,255,0.15);
            border-radius: 2px; outline: none; cursor: pointer;
        }
        .sim-slider-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 12px; height: 12px; border-radius: 50%;
            background: #ff8855; cursor: pointer; border: none;
        }
        .sim-slider-label {
            font-size: 10px; font-weight: 600; color: #ff8855;
            min-width: 55px; text-align: right; letter-spacing: 0.5px;
        }

        #loading {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 1.2s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loading-ring {
            width: 50px; height: 50px; border: 2px solid rgba(255,255,255,0.08);
            border-top-color: #6ec6ff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 18px; font-size: 10px; letter-spacing: 4px;
            text-transform: uppercase; color: rgba(255,255,255,0.3);
        }

        .met-counter {
            font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.25); letter-spacing: 1.5px; margin-top: 4px;
        }

        /* Connection line indicator */
        .dist-line-label {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 2px;
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">Initializing Tracker</div>
    </div>

    <div id="canvas-container"></div>

    <div id="hud">
        <div id="hud-left">
            <div class="mission-title">NASA &middot; CSA</div>
            <div class="mission-name">ARTEMIS II</div>
            <div class="mission-status">
                <div class="status-dot"></div>
                <span id="phase-text">In Transit to Moon</span>
            </div>
            <div class="met-counter" id="met-counter">T+00:00:00:00</div>
        </div>
    </div>


    <div id="telemetry">
        <div class="telem-grid">
            <div class="telem-card">
                <div class="telem-label">Earth Distance</div>
                <div><span class="telem-value" id="dist-earth">—</span><span class="telem-unit">km</span></div>
            </div>
            <div class="telem-card">
                <div class="telem-label">Moon Distance</div>
                <div><span class="telem-value" id="dist-moon">—</span><span class="telem-unit">km</span></div>
            </div>
            <div class="telem-card">
                <div class="telem-label">Velocity</div>
                <div><span class="telem-value" id="velocity">—</span><span class="telem-unit">km/s</span></div>
            </div>
            <div class="telem-card">
                <div class="telem-label">Mission Day</div>
                <div><span class="telem-value" id="mission-day">—</span></div>
            </div>
        </div>
    </div>

    <div id="timeline">
        <div class="timeline-bar">
            <div class="timeline-header">
                <div class="timeline-title">Mission Time</div>
                <div class="timeline-met" id="met-display">—</div>
            </div>
            <div class="progress-track">
                <input type="range" class="timeline-slider" id="timeline-slider"
                       min="0" max="10000" value="0"
                       oninput="onTimelineScrub(this.value)">
            </div>
            <div class="phase-labels">
                <span class="phase-label" id="pl-launch">Launch</span>
                <span class="phase-label" id="pl-tli">TLI</span>
                <span class="phase-label" id="pl-transit">Transit</span>
                <span class="phase-label" id="pl-flyby">Flyby</span>
                <span class="phase-label" id="pl-return">Return</span>
                <span class="phase-label" id="pl-reentry">Entry</span>
            </div>
        </div>
    </div>

    <div id="controls-hint">
        <button class="hint-btn" id="btn-follow" onclick="toggleFollow()">Follow Orion</button>
        <button class="hint-btn" onclick="focusEarth()">Focus Earth</button>
        <button class="hint-btn" onclick="focusMoon()">Focus Moon</button>
        <button class="hint-btn" onclick="focusOverview()">Overview</button>
        <div class="sim-group">
            <button class="hint-btn" id="btn-sim" onclick="toggleSimMenu()">Simulate Travel</button>
            <div class="sim-dropdown" id="sim-dropdown">
                <button class="sim-opt" onclick="setSpeed(1000)">1,000x</button>
                <button class="sim-opt" onclick="setSpeed(5000)">5,000x</button>
                <button class="sim-opt" onclick="setSpeed(10000)">10,000x</button>
                <button class="sim-opt" onclick="setSpeed(30000)">30,000x</button>
            </div>
        </div>
        <button class="hint-btn" id="btn-reset" onclick="resetRealTime()" style="display:none">Reset to Real Time</button>
        <div class="sim-slider-wrap" id="sim-slider-wrap">
            <input type="range" id="sim-slider" min="0" max="100" value="25"
                   oninput="onSliderChange(this.value)">
            <span class="sim-slider-label" id="sim-slider-label">1,000x</span>
        </div>
    </div>

    <script type="importmap">

        }
    }
    </script>

            if (day <= TRAJ_START_DAY) return horizonsToThree(NASA_MOON[0]);
            const maxDay = TRAJ_START_DAY + (NASA_MOON.length - 1) * TRAJ_STEP_DAYS;

        // Data starts at Apr 2 03:00 UTC = day 0.184 after launch (Apr 1 22:35)
        const TRAJ_START_DAY = (3 + 24 - 22.5833) / 24; // ~0.184 days
        const TRAJ_STEP_DAYS = 2 / 24; // 2 hours between points
        const TRAJ_N = NASA_TRAJ.length; // 107 points

        // Catmull-Rom interpolation for smooth curve through real data
        function catmullRom(p0, p1, p2, p3, t) {
            const t2 = t * t, t3 = t2 * t;
            return new THREE.Vector3(
                0.5 * ((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
                0.5 * ((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3),
                0.5 * ((2*p1.z) + (-p0.z+p2.z)*t + (2*p0.z-5*p1.z+4*p2.z-p3.z)*t2 + (-p0.z+3*p1.z-3*p2.z+p3.z)*t3)
            );
        }

        // Convert Horizons EME2000 [X,Y,Z] → Three.js [X,Z,Y] (Y-up)
        function horizonsToThree(d) {
            return new THREE.Vector3(d[0], d[2], d[1]);
        }

        function getTrajectoryPos(day) {
            // Before data starts: hold at first point
            if (day <= TRAJ_START_DAY) return horizonsToThree(NASA_TRAJ[0]);
            // After data ends: hold at last point
            const maxDay = TRAJ_START_DAY + (TRAJ_N - 1) * TRAJ_STEP_DAYS;
            if (day >= maxDay) return horizonsToThree(NASA_TRAJ[TRAJ_N - 1]);

            // Find which segment we're in
            const fIdx = (day - TRAJ_START_DAY) / TRAJ_STEP_DAYS;
            const i = Math.floor(fIdx);
            const t = fIdx - i;

            // Catmull-Rom needs 4 points: clamp at boundaries
            const i0 = Math.max(0, i - 1);
            const i1 = Math.min(TRAJ_N - 1, i);
            const i2 = Math.min(TRAJ_N - 1, i + 1);
            const i3 = Math.min(TRAJ_N - 1, i + 2);

            const p0 = horizonsToThree(NASA_TRAJ[i0]);
            const p1 = horizonsToThree(NASA_TRAJ[i1]);
            const p2 = horizonsToThree(NASA_TRAJ[i2]);
            const p3 = horizonsToThree(NASA_TRAJ[i3]);

            return catmullRom(p0, p1, p2, p3, t);
        }

        // Index where TLI occurs — skip Earth orbit phase to avoid Catmull-Rom artifacts
        const TLI_INDEX = 11;
        const TLI_DAY = TRAJ_START_DAY + TLI_INDEX * TRAJ_STEP_DAYS; // ~1.1 days

        // Pre-generate full trajectory curve — directly iterate post-TLI data
        // with clamped Catmull-Rom neighbors (never touches pre-TLI points)
        function buildTrajectoryCurve() {
            const pts = [];
            const SUBDIV = 10; // subdivisions per data segment for smoothness
            for (let i = TLI_INDEX; i < TRAJ_N - 1; i++) {
                for (let s = 0; s < SUBDIV; s++) {
                    const t = s / SUBDIV;
                    const i0 = Math.max(TLI_INDEX, i - 1); // clamp: never use pre-TLI
                    const i3 = Math.min(TRAJ_N - 1, i + 2);
                    const p = catmullRom(
                        horizonsToThree(NASA_TRAJ[i0]),
                        horizonsToThree(NASA_TRAJ[i]),
                        horizonsToThree(NASA_TRAJ[i + 1]),
                        horizonsToThree(NASA_TRAJ[i3]),
                        t
                    );
                    pts.push(new THREE.Vector3(p.x * SCALE, p.y * SCALE, p.z * SCALE));
                }
            }
            // Add final point
            const last = horizonsToThree(NASA_TRAJ[TRAJ_N - 1]);
            pts.push(new THREE.Vector3(last.x * SCALE, last.y * SCALE, last.z * SCALE));
            return pts;
        }

        // ═══════════════════════════════════════════

                orbitPts.push(new THREE.Vector3(p.x * SCALE, p.y * SCALE, p.z * SCALE));

        let speedMult = 1;
        let simStartReal = null;   // Date.now() when sim was activated
        let simStartDay = null;    // mission day when sim was activated
        let prevFrameTime = Date.now();
        let sunAngle = 0;          // Sun orbital angle
        let targetPos = null;
        let targetLook = null;

        function clearActiveButtons() {
            document.getElementById('btn-follow').classList.remove('active');
        }

        // Follow Orion: orbit controls stay enabled, target tracks Orion
        window.toggleFollow = () => {
            if (cameraMode === 'follow-orion') {
                cameraMode = 'free';
                clearActiveButtons();
                return;
            }
            cameraMode = 'follow-orion';
            clearActiveButtons();
            document.getElementById('btn-follow').classList.add('active');
            controls.enabled = true;
            const op = orionGroup.position.clone();
            targetPos = op.clone().add(new THREE.Vector3(1, 1.5, 2));
            targetLook = op.clone();
        };

        window.focusEarth = () => {
            cameraMode = 'free';
            clearActiveButtons();
            controls.enabled = true;
            targetPos = new THREE.Vector3(0, eR * 6, eR * 8);
            targetLook = new THREE.Vector3(0, 0, 0);
        };

        window.focusMoon = () => {
            cameraMode = 'free';
            clearActiveButtons();
            controls.enabled = true;
            const mp = moonGroup.position;
            targetPos = new THREE.Vector3(mp.x + mR * 4, mp.y + mR * 6, mp.z + mR * 10);
            targetLook = mp.clone();
        };

        // Overview: orbit controls target = midpoint of trajectory
        window.focusOverview = () => {
            cameraMode = 'overview';
            clearActiveButtons();
            controls.enabled = true;
            const mid = moonGroup.position.clone().multiplyScalar(0.45);
            mid.y = 0;
            targetPos = new THREE.Vector3(mid.x, 100, mid.z + 60);
            targetLook = mid.clone();
        };

        // Simulate travel
        window.toggleSimMenu = () => {
            document.getElementById('sim-dropdown').classList.toggle('open');
        };

        // Slider maps 0-100 → 500x to 50000x (exponential)
        function sliderToSpeed(val) {
            const t = val / 100; // 0→1
            return Math.round(500 * Math.pow(100, t)); // 500 → 50000
        }

        function speedToSlider(spd) {
            return Math.round(100 * Math.log(spd / 500) / Math.log(100));
        }

        window.setSpeed = (spd) => {
            simStartReal = Date.now();
            // Start simulation from scrub position if user was scrubbing, else from real time
            if (scrubDay !== null) {
                simStartDay = scrubDay;
                scrubDay = null;
            } else {
                const elapsed = simStartReal - LAUNCH_TIME;
                simStartDay = Math.max(0, Math.min(elapsed / MISSION_DURATION_MS, 1.0)) * MISSION_DAYS;
            }
            speedMult = spd;
            document.getElementById('sim-dropdown').classList.remove('open');
            document.getElementById('btn-sim').classList.add('sim-active');
            document.getElementById('btn-sim').textContent = `Simulating ${spd.toLocaleString()}x`;
            document.getElementById('btn-reset').style.display = 'block';
            // Show slider and sync it
            document.getElementById('sim-slider-wrap').classList.add('visible');
            document.getElementById('sim-slider').value = speedToSlider(spd);
            document.getElementById('sim-slider-label').textContent = spd.toLocaleString() + 'x';
        };

        window.onSliderChange = (val) => {
            const spd = sliderToSpeed(Number(val));
            // Keep simStartReal but recalculate simStartDay from current simDay
            const now = Date.now();
            if (simStartReal !== null) {
                const dtMs = now - simStartReal;
                const curSimDay = simStartDay + (dtMs * speedMult) / MISSION_DURATION_MS * MISSION_DAYS;
                simStartDay = Math.max(0, Math.min(curSimDay, MISSION_DAYS));
            } else {
                const elapsed = now - LAUNCH_TIME;
                simStartDay = Math.max(0, Math.min(elapsed / MISSION_DURATION_MS, 1.0)) * MISSION_DAYS;
            }
            simStartReal = now;
            speedMult = spd;
            document.getElementById('btn-sim').textContent = `Simulating ${spd.toLocaleString()}x`;
            document.getElementById('sim-slider-label').textContent = spd.toLocaleString() + 'x';
        };

        window.resetRealTime = () => {
            speedMult = 1;
            simStartReal = null;
            simStartDay = null;
            scrubDay = null;
            document.getElementById('btn-sim').classList.remove('sim-active');
            document.getElementById('btn-sim').textContent = 'Simulate Travel';
            document.getElementById('btn-reset').style.display = 'none';
            document.getElementById('sim-slider-wrap').classList.remove('visible');
        };

        // Timeline scrub — user drags the mission timeline slider
        let scrubDay = null;
        let scrubbing = false;

        window.onTimelineScrub = (val) => {
            // Slider 0-10000 maps to TLI_DAY → MISSION_DAYS
            scrubDay = TLI_DAY + (val / 10000) * (MISSION_DAYS - TLI_DAY);
            scrubbing = true;
            // Pause any running simulation
            if (speedMult > 1) {
                simStartReal = null;
                simStartDay = null;
                speedMult = 1;
                document.getElementById('btn-sim').classList.remove('sim-active');
                document.getElementById('btn-sim').textContent = 'Simulate Travel';
                document.getElementById('btn-reset').style.display = 'none';
                document.getElementById('sim-slider-wrap').classList.remove('visible');
            }
        };

        // Detect when user finishes scrubbing
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('timeline-slider');
            if (slider) {
                slider.addEventListener('pointerup', () => { scrubbing = false; });
                slider.addEventListener('touchend', () => { scrubbing = false; });
            }
        });

        // Cancel camera animation as soon as user interacts
        ['pointerdown', 'wheel', 'touchstart'].forEach(evt => {
            renderer.domElement.addEventListener(evt, () => {
                targetPos = null;
                targetLook = null;
            }, { passive: true });
        });

        // Close dropdown on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.sim-group')) {
                document.getElementById('sim-dropdown').classList.remove('open');
            }
        });

        // ═══════════════════════════════════════════
        // ANIMATION LOOP
        // ═══════════════════════════════════════════
        let prevOrionPos = null;

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();

            // Delta time (seconds)
            const dt = (now - prevFrameTime) / 1000;
            prevFrameTime = now;

            // Mission time (real for HUD)
            const realElapsed = now - LAUNCH_TIME;
            const realT = Math.max(0, Math.min(realElapsed / MISSION_DURATION_MS, 1.0));
            const realDay = realT * MISSION_DAYS;

            // Simulated time for 3D scene
            let simDay;
            if (scrubDay !== null) {
                // User is scrubbing the timeline
                simDay = scrubDay;
            } else if (simStartReal !== null && speedMult > 1) {
                const dtMs = now - simStartReal;
                simDay = simStartDay + (dtMs * speedMult) / MISSION_DURATION_MS * MISSION_DAYS;
                simDay = Math.max(0, Math.min(simDay, MISSION_DAYS));
            } else {
                simDay = realDay;
            }
            const simT = simDay / MISSION_DAYS;

            // ── Update Moon ──
            const moonKm = getMoonPos(simDay);
            moonGroup.position.set(moonKm.x * SCALE, moonKm.y * SCALE, moonKm.z * SCALE);

            // ── Update Orion ──
            const orionKm = getTrajectoryPos(simDay);
            const orionSc = new THREE.Vector3(orionKm.x * SCALE, orionKm.y * SCALE, orionKm.z * SCALE);
            orionGroup.position.copy(orionSc);

            // Orient along trajectory
            const nextKm = getTrajectoryPos(Math.min(simDay + 0.005, MISSION_DAYS));
            const dir = new THREE.Vector3().subVectors(
                new THREE.Vector3(nextKm.x, nextKm.y, nextKm.z),
                orionKm
            ).normalize();
            orionGroup.lookAt(orionSc.clone().add(dir.clone().multiplyScalar(SCALE)));

            // Beacon pulse
            beacon.material.opacity = 0.7 + 0.3 * Math.sin(now * 0.006);
            engineGlow.intensity = 2 + Math.sin(now * 0.004) * 1;

            // ── Traveled trajectory ──
            // trajPts maps data indices TLI_INDEX..TRAJ_N-1, 10 subdivisions each
            // Convert simDay to matching data index
            const dataIdx = (simDay - TRAJ_START_DAY) / TRAJ_STEP_DAYS;
            const trajIdx = Math.max(0, (dataIdx - TLI_INDEX) * 10);
            const traveledIdx = Math.min(trajPts.length, Math.max(2, Math.ceil(trajIdx)));
            const traveled = trajPts.slice(0, traveledIdx);
            traveledLine.geometry.dispose();
            traveledLine.geometry = new THREE.BufferGeometry().setFromPoints(traveled);

            // ── Earth-Moon line ──
            emLine.geometry.dispose();
            emLine.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0), moonGroup.position.clone()
            ]);
            emLine.computeLineDistances();

            // ── Earth rotation (360° in 24h, accelerated with sim) ──
            const earthAngularVel = (2 * Math.PI) / 86400; // rad/s
            earthMesh.rotation.y += earthAngularVel * dt * (speedMult > 1 ? speedMult : 1);

            // ── Sun orbital motion (Earth orbits Sun in 365.25 days) ──
            const sunAngularVel = (2 * Math.PI) / (365.25 * 86400); // rad/s
            sunAngle += sunAngularVel * dt * (speedMult > 1 ? speedMult : 1);
            const sunDist = 350;
            sunDir.position.set(
                Math.cos(sunAngle) * sunDist,
                80,
                -Math.sin(sunAngle) * sunDist * 0.5
            );

            // ── Camera ──
            // Animate transitions first (button clicks)
            if (targetPos) {
                camera.position.lerp(targetPos, 0.06);
                controls.target.lerp(targetLook, 0.06);
                if (camera.position.distanceTo(targetPos) < 1.0) {
                    targetPos = null;
                    targetLook = null;
                }
            }

            // After transition, continuously track targets (direct copy, no lerp = no fighting)
            if (!targetPos) {
                if (cameraMode === 'follow-orion') {
                    // Move camera with Orion — keep relative offset stable
                    const offset = camera.position.clone().sub(controls.target);
                    controls.target.copy(orionSc);
                    camera.position.copy(orionSc).add(offset);
                } else if (cameraMode === 'overview') {
                    const mid = moonGroup.position.clone().multiplyScalar(0.45);
                    mid.y = 0;
                    const offset = camera.position.clone().sub(controls.target);
                    controls.target.copy(mid);
                    camera.position.copy(mid).add(offset);
                }
            }

            controls.update();

            // Labels face camera
            earthLabel.lookAt(camera.position);
            moonLabel.lookAt(camera.position);
            orionLabel.lookAt(camera.position);

            // ═══ HUD UPDATE — uses simDay during simulation/scrub ═══
            const hudDay = (scrubDay !== null || speedMult > 1) ? simDay : realDay;
            const hudT = hudDay / MISSION_DAYS;
            const hudElapsedMs = hudDay * 86400000;

            // Human-readable date/time in user's timezone
            const missionDate = new Date(LAUNCH_TIME + hudElapsedMs);
            const dateStr = missionDate.toLocaleDateString(undefined, {
                weekday: 'short', month: 'short', day: 'numeric'
            });
            const timeStr = missionDate.toLocaleTimeString(undefined, {
                hour: '2-digit', minute: '2-digit', hour12: false
            });
            document.getElementById('met-display').textContent = `${dateStr}, ${timeStr}`;

            // Update timeline slider (only when not being dragged)
            if (!scrubbing) {
                const sliderVal = Math.max(0, (hudDay - TLI_DAY) / (MISSION_DAYS - TLI_DAY)) * 10000;
                document.getElementById('timeline-slider').value = Math.round(Math.min(10000, sliderVal));
            }
            // Update slider gradient fill
            const pct = Math.max(0, Math.min(100, (hudDay - TLI_DAY) / (MISSION_DAYS - TLI_DAY) * 100));
            document.getElementById('timeline-slider').style.background =
                `linear-gradient(90deg, #ff6b35 0%, #6ec6ff ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;

            // Phase labels
            [['pl-launch',0,0.106],['pl-tli',0.106,0.15],['pl-transit',0.15,0.53],
             ['pl-flyby',0.53,0.63],['pl-return',0.63,0.95],['pl-reentry',0.95,1]
            ].forEach(([id,s,e]) => {
                document.getElementById(id).classList.toggle('active', hudT >= s && hudT < e);
            });

            // Phase text (matches real Artemis II timeline)
            let phase = 'Mission Complete';
            if (hudDay < 1.06) phase = 'Earth Orbit';
            else if (hudDay < 1.5) phase = 'Translunar Injection';
            else if (hudDay < 5.3) phase = 'Translunar Coast';
            else if (hudDay < 6.3) phase = 'Lunar Flyby';
            else if (hudDay < 9.5) phase = 'Return Transit';
            else if (hudDay < 10) phase = 'Re-entry';
            document.getElementById('phase-text').textContent = phase;

            // MET counter
            const metMs = Math.max(0, hudElapsedMs);
            const metD = Math.floor(metMs / 86400000);
            const metH = Math.floor((metMs % 86400000) / 3600000);
            const metM = Math.floor((metMs % 3600000) / 60000);
            const metS = Math.floor((metMs % 60000) / 1000);
            document.getElementById('met-counter').textContent =
                `T+${String(metD).padStart(2,'0')}:${String(metH).padStart(2,'0')}:${String(metM).padStart(2,'0')}:${String(metS).padStart(2,'0')}`;

            // Distances
            const dEarth = Math.max(0, orionKm.length() - EARTH_RADIUS_KM);
            const dMoon = Math.max(0, orionKm.clone().sub(moonKm).length() - MOON_RADIUS_KM);

            document.getElementById('dist-earth').textContent = formatKm(dEarth);
            document.getElementById('dist-moon').textContent = formatKm(dMoon);

            // Velocity
            const velStep = 0.002;
            const prevKm = getTrajectoryPos(Math.max(0, simDay - velStep));
            const vel = orionKm.clone().sub(prevKm).length() / (velStep * 86400);
            document.getElementById('velocity').textContent = vel.toFixed(2);

            // Mission day
            document.getElementById('mission-day').textContent = `Day ${Math.floor(hudDay) + 1} of 10`;

            // Render
            composer.render();
        }

        // ═══════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
        });

        // Start in overview mode — compute initial Moon position to place camera
        (() => {
            const now = Date.now();
            const elapsed = now - LAUNCH_TIME;
            const t = Math.max(0, Math.min(elapsed / MISSION_DURATION_MS, 1.0));
            const day = t * MISSION_DAYS;
            const moonKm = getMoonPos(day);
            moonGroup.position.set(moonKm.x * SCALE, moonKm.y * SCALE, moonKm.z * SCALE);
            const mid = moonGroup.position.clone().multiplyScalar(0.45);
            mid.y = 0;
            camera.position.set(mid.x, 100, mid.z + 60);
            controls.target.copy(mid);
            controls.update();
            cameraMode = 'overview';
        })();

        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1500);

        animate();
    </script>
</body>
</html>
